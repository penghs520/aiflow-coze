<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录/注册 - AI工作流平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', 'Noto Sans CJK', sans-serif;
        }
        
        :root {
            --bg-primary: #121212;
            --bg-card: #1E1E1E;
            --bg-surface: #252525;
            --divider: #333333;
            
            --primary-blue: #3366CC;
            --primary-light: #4D8BF5;
            --primary-dark: #1A4DA3;
            
            --text-primary: #FFFFFF;
            --text-secondary: #B0B0B0;
            --text-disabled: #666666;
            --text-error: #FF4D4F;
            
            --success: #52C41A;
            --warning: #FAAD14;
            --error: #FF4D4F;
            --info: #1890FF;
            
            --radius-small: 4px;
            --radius-medium: 8px;
            --radius-large: 12px;
            --radius-full: 50%;
            
            --spacing-xs: 4px;
            --spacing-s: 8px;
            --spacing-m: 16px;
            --spacing-l: 24px;
            --spacing-xl: 32px;
        }
        
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: var(--spacing-m);
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        /* 返回按钮 */
        .back-button {
            position: fixed;
            top: var(--spacing-m);
            left: var(--spacing-m);
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            border: none;
            border-radius: var(--radius-full);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 101;
            backdrop-filter: blur(10px);
        }
        
        .back-button:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }
        
        /* 欢迎标题 */
        .welcome-header {
            text-align: center;
            margin-bottom: var(--spacing-xl);
        }
        
        .welcome-logo {
            font-size: 48px;
            color: var(--primary-blue);
            margin-bottom: var(--spacing-m);
        }
        
        .welcome-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: var(--spacing-s);
        }
        
        .welcome-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        /* 表单卡片 */
        .form-card {
            background-color: var(--bg-card);
            border-radius: var(--radius-large);
            padding: var(--spacing-xl);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            margin-bottom: var(--spacing-l);
        }
        
        /* 表单组 */
        .form-group {
            margin-bottom: var(--spacing-l);
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: var(--spacing-s);
            color: var(--text-primary);
        }
        
        .form-group .input-with-button {
            display: flex;
            gap: var(--spacing-s);
        }
        
        /* 输入框 */
        .input-field {
            width: 100%;
            background-color: var(--bg-surface);
            border: 1px solid var(--divider);
            border-radius: var(--radius-medium);
            padding: 12px;
            color: var(--text-primary);
            font-size: 14px;
            transition: border-color 0.2s;
        }
        
        .input-field:focus {
            outline: none;
            border-color: var(--primary-blue);
        }
        
        .input-field::placeholder {
            color: var(--text-secondary);
        }
        
        /* 按钮 */
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: var(--radius-medium);
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            border: none;
            text-decoration: none;
            transition: background-color 0.2s;
            font-size: 14px;
        }
        
        .btn-primary {
            background-color: var(--primary-blue);
            color: white;
        }
        
        .btn-primary:hover {
            background-color: var(--primary-light);
        }
        
        .btn-secondary {
            background-color: transparent;
            color: var(--primary-blue);
            border: 1px solid var(--primary-blue);
        }
        
        .btn-secondary:hover {
            background-color: rgba(51, 102, 204, 0.1);
        }
        
        .btn-block {
            display: block;
            width: 100%;
        }
        
        /* 验证码按钮 */
        .btn-sms {
            background-color: var(--primary-dark);
            color: white;
            padding: 12px 16px;
            white-space: nowrap;
            min-width: 100px;
        }
        
        .btn-sms:disabled {
            background-color: var(--divider);
            color: var(--text-disabled);
            cursor: not-allowed;
        }
        
        /* 切换标签 */
        .auth-tabs {
            display: flex;
            margin-bottom: var(--spacing-l);
            background-color: var(--bg-surface);
            border-radius: var(--radius-medium);
            padding: var(--spacing-xs);
        }
        
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: var(--spacing-s);
            border-radius: var(--radius-small);
            cursor: pointer;
            color: var(--text-secondary);
            font-weight: bold;
            transition: all 0.2s;
        }
        
        .auth-tab.active {
            background-color: var(--primary-blue);
            color: white;
        }
        
        /* 额外选项 */
        .auth-options {
            margin-top: var(--spacing-l);
            text-align: center;
        }
        
        .auth-links {
            display: flex;
            justify-content: space-between;
            margin-top: var(--spacing-m);
        }
        
        .auth-link {
            color: var(--primary-blue);
            text-decoration: none;
            font-size: 13px;
        }
        
        .auth-link:hover {
            text-decoration: underline;
        }
        
        /* 第三方登录 */
        .social-login {
            margin-top: var(--spacing-l);
            text-align: center;
        }
        
        .social-title {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: var(--spacing-m);
            position: relative;
        }
        
        .social-title::before,
        .social-title::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background-color: var(--divider);
        }
        
        .social-title::before {
            left: 0;
        }
        
        .social-title::after {
            right: 0;
        }
        
        .social-buttons {
            display: flex;
            gap: var(--spacing-m);
            justify-content: center;
        }
        
        .social-btn {
            width: 56px;
            height: 56px;
            border-radius: var(--radius-full);
            background-color: var(--bg-surface);
            border: 1px solid var(--divider);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        
        .social-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }
        
        /* 奖励提示 */
        .reward-notice {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary-blue));
            border-radius: var(--radius-large);
            padding: var(--spacing-m);
            text-align: center;
            margin-top: var(--spacing-l);
        }
        
        .reward-title {
            font-size: 16px;
            font-weight: bold;
            color: white;
            margin-bottom: var(--spacing-xs);
        }
        
        .reward-desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.9);
        }
        
        .material-icons {
            font-family: 'Material Icons';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>
<body>
    <!-- 返回按钮 -->
    <button class="back-button" onclick="location.href='index.html'">
        <span class="material-icons">arrow_back</span>
    </button>
    
    <div class="container">
        <!-- 欢迎标题 -->
        <div class="welcome-header">
            <div class="welcome-logo">
                <span class="material-icons">bolt</span>
            </div>
            <h1 class="welcome-title">AI工作流平台</h1>
            <p class="welcome-subtitle">开启智能创作之旅</p>
        </div>
        
        <!-- 切换标签 -->
        <div class="auth-tabs">
            <div class="auth-tab active" onclick="switchTab('login')">登录</div>
            <div class="auth-tab" onclick="switchTab('register')">注册</div>
        </div>
        
        <!-- 登录表单 -->
        <div id="login-form" class="form-card">
            <div class="form-group">
                <label for="login-phone">手机号码</label>
                <input type="tel" id="login-phone" class="input-field" placeholder="请输入手机号码" value="13800138000">
            </div>
            
            <div class="form-group">
                <label for="login-sms">验证码</label>
                <div class="input-with-button">
                    <input type="text" id="login-sms" class="input-field" placeholder="请输入6位验证码" value="123456">
                    <button id="login-sms-btn" class="btn btn-sms" onclick="sendSMS('login')">获取验证码</button>
                </div>
            </div>
            
            <button class="btn btn-primary btn-block" onclick="handleLogin()">登录</button>
            
            <div class="auth-options">
                <div class="auth-links">
                    <a href="forgot-password.html" class="auth-link">忘记密码？</a>
                    <a href="#" class="auth-link" onclick="switchTab('register'); return false;">没有账号？立即注册</a>
                </div>
            </div>
        </div>
        
        <!-- 注册表单 -->
        <div id="register-form" class="form-card" style="display: none;">
            <div class="form-group">
                <label for="register-phone">手机号码</label>
                <input type="tel" id="register-phone" class="input-field" placeholder="请输入手机号码" value="13800138000">
            </div>
            
            <div class="form-group">
                <label for="register-sms">验证码</label>
                <div class="input-with-button">
                    <input type="text" id="register-sms" class="input-field" placeholder="请输入6位验证码" value="123456">
                    <button id="register-sms-btn" class="btn btn-sms" onclick="sendSMS('register')">获取验证码</button>
                </div>
            </div>
            
            <div class="form-group">
                <label for="register-invite">邀请码（可选）</label>
                <input type="text" id="register-invite" class="input-field" placeholder="请输入邀请码">
            </div>
            
            <div class="form-group" style="margin-top: var(--spacing-l);">
                <label style="font-size: 13px; color: var(--text-secondary); font-weight: normal; display: flex; align-items: center;">
                    <input type="checkbox" id="agree-terms" checked style="margin-right: var(--spacing-s);">
                    我已阅读并同意《用户协议》和《隐私政策》
                </label>
            </div>
            
            <button class="btn btn-primary btn-block" onclick="handleRegister()">注册并领取奖励</button>
            
            <div class="auth-options">
                <div class="auth-links">
                    <a href="#" class="auth-link" onclick="switchTab('login'); return false;">已有账号？立即登录</a>
                </div>
            </div>
        </div>
        
        <!-- 奖励提示 -->
        <div class="reward-notice">
            <div class="reward-title">首次注册奖励</div>
            <div class="reward-desc">新用户注册立即赠送 30,000 资源点，可用于所有工作流任务</div>
        </div>
        
        <!-- 第三方登录 -->
        <div class="social-login">
            <div class="social-title">第三方账号登录</div>
            <div class="social-buttons">
                <div class="social-btn" onclick="socialLogin('wechat')">
                    <span class="material-icons">chat</span>
                </div>
                <div class="social-btn" onclick="socialLogin('qq')">
                    <span style="font-size: 20px; font-weight: bold;">QQ</span>
                </div>
                <div class="social-btn" onclick="socialLogin('weibo')">
                    <span style="font-size: 20px; font-weight: bold;">WB</span>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 切换登录/注册标签
        function switchTab(tab) {
            // 更新标签状态
            document.querySelectorAll('.auth-tab').forEach(el => {
                el.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 显示对应的表单
            document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
        }
        
        // 发送验证码
        function sendSMS(type) {
            const phoneField = document.getElementById(`${type}-phone`);
            const phone = phoneField.value.trim();
            const btn = document.getElementById(`${type}-sms-btn`);
            
            if (!phone || phone.length !== 11) {
                alert('请输入正确的手机号码');
                return;
            }
            
            // 禁用按钮
            btn.disabled = true;
            btn.textContent = '60秒后重试';
            
            // 模拟倒计时
            let countdown = 60;
            const timer = setInterval(() => {
                countdown--;
                btn.textContent = `${countdown}秒后重试`;
                
                if (countdown <= 0) {
                    clearInterval(timer);
                    btn.disabled = false;
                    btn.textContent = '获取验证码';
                }
            }, 1000);
            
            alert('验证码已发送至 ' + phone + '（模拟）\n验证码: 123456');
        }
        
        // 处理登录
        function handleLogin() {
            const phone = document.getElementById('login-phone').value.trim();
            const sms = document.getElementById('login-sms').value.trim();
            
            if (!phone) {
                alert('请输入手机号码');
                return;
            }
            
            if (!sms || sms.length !== 6) {
                alert('请输入6位验证码');
                return;
            }
            
            // 模拟登录成功
            alert('登录成功！欢迎回来。');
            location.href = 'index.html';
        }
        
        // 处理注册
        function handleRegister() {
            const phone = document.getElementById('register-phone').value.trim();
            const sms = document.getElementById('register-sms').value.trim();
            const agree = document.getElementById('agree-terms').checked;
            
            if (!phone) {
                alert('请输入手机号码');
                return;
            }
            
            if (!sms || sms.length !== 6) {
                alert('请输入6位验证码');
                return;
            }
            
            if (!agree) {
                alert('请阅读并同意《用户协议》和《隐私政策》');
                return;
            }
            
            // 模拟注册成功
            alert('注册成功！已为您赠送30,000资源点。');
            location.href = 'index.html';
        }
        
        // 第三方登录
        function socialLogin(platform) {
            alert('正在跳转至 ' + platform + ' 登录（模拟）');
            // 实际应用中会跳转到第三方授权页面
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 预填充示例数据
            console.log('登录/注册页面已加载');
        });
    </script>
</body>
</html>
